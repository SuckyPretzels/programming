<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TicTacToe</title>
        <style>
* {
    box-sizing: border-box;
}

body {
    background-color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.game {
    display: flex;
    align-items: flex-end;
    gap: 40px;
    margin-left: 190px;
}

.playarea {
    background-color: #333;
    padding: 20px;
    border-radius: 20px;
    width: 500px;
    height: 500px;
    flex-shrink: 0;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

#reset-btn {
    background-color: #222;
    padding: 5px;
    border-radius: 10px;
    width: 100%;
    height: 50%;
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: lightgray;
}

#reset-btn:hover {
    background-color: #444;
    transform: scale(1.05);
}

.status-area {
    background-color: #333;
    padding: 5px;
    border-radius: 10px;
    width: 150px;
    height: 120px;
    text-align: center;
}

#status {
    margin: 0;
    font-size: 2rem;
    font-weight: bold;
    color: lightgray;
}

#player-symbol {
    margin: 0;
    font-size: 2rem;
    font-weight: bold;
}

button {
    height: 145px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background-color: #222;
    font-size: 100px;
    font-weight: bold;
}

.x {
    color: #4da6ff;
}

.o {
    color: #ff4d4d;
}

button.winner {
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    transition: all 0.3s ease;
}

</style>
    </head> 
    <body>
        <div class="game">
            <div class="playarea">
                <div class="buttons">
                    <button data-index='0'></button>
                    <button data-index='1'></button>
                    <button data-index='2'></button>

                    <button data-index='3'></button>
                    <button data-index='4'></button>
                    <button data-index='5'></button>

                    <button data-index='6'></button>
                    <button data-index='7'></button>
                    <button data-index='8'></button>
                </div>
            </div>
            <div class="status-area">
                <button id="reset-btn">Reset</button>
                <p id="status">
                    <span class="x" id="player-symbol">X</span><span id="status-message">'s turn</span>
                </p>
            </div>
        </div>
        <script>
const buttons = document.querySelectorAll('.buttons button');
const playerSymbol = document.getElementById('player-symbol');
const resetBtn = document.getElementById('reset-btn');
const statusMessage = document.getElementById('status-message');
let playerStart = "X"; // who should start the NEXT round.
let player = playerStart;
let boardState = emptyBoard();
let gameOver = false;
buttons.forEach(button => {
    button.addEventListener('click', handleClick);
});

function emptyBoard() {
    return [
        "", "", "",
        "", "", "",
        "", "", ""
    ];
}

function handleClick(event) {
    const button = event.target;
    const index = parseInt(button.dataset.index);

    if (gameOver || boardState[index] !== "") { return; }

    boardState[index] = player;
    button.textContent = player;
    
    if (player === "X") {
        button.classList.add("x");
    } else {
        button.classList.add("o");
    }

    const winningResult = checkWin();

    if (winningResult || checkDraw()) {
        gameOver = true;
    }

    if (winningResult) {
        winningResult.forEach(line => {
            highlightWinningLine(line);
        });
        const winner = boardState[winningResult[0][0]];
        updateStatus("win", winner);
        return;
    }

    if (checkDraw()) {
        updateStatus("draw");
        return;
    }
    updatePlayer("turn");
    updateStatus("turn", player);
}

function reset() {
    boardState = emptyBoard();

    buttons.forEach(button => {
        button.textContent = "";
        button.classList.remove('x','o','winner');
    });
    updatePlayer("reset");
    gameOver = false;
    updateStatus("turn", player);
}

resetBtn.addEventListener('click', reset);

function updatePlayer(type) {
    if (type === "reset") {
        if (gameOver) {
            playerStart = playerStart === "X" ? "O" : "X";
            player = playerStart;
        } else {
            player = playerStart;
        }
    } else if (type === "turn") {
        player = player === "X" ? "O" : "X";
    }
}

function updateStatus(type, value) {
    playerSymbol.classList.remove('x','o');

    if (type === "turn") {
        playerSymbol.textContent = value;
        playerSymbol.classList.add(value.toLowerCase());
        statusMessage.textContent = "'s turn";
    }

    if (type === "win") {
        playerSymbol.textContent = value;
        playerSymbol.classList.add(value.toLowerCase());
        statusMessage.textContent = " wins!";
    }

    if (type === "draw") {
        playerSymbol.textContent = "";
        statusMessage.textContent = "Draw!";
    }
}

function checkWin() {
    const winPatterns = [
        // horizontal wins
        [0,1,2],
        [3,4,5],
        [6,7,8],

        // vertical wins
        [0,3,6],
        [1,4,7],
        [2,5,8],

        // diagonal wins
        [0,4,8],
        [2,4,6]
    ];

    let winningLines = [];

    for (let pattern of winPatterns) {
        const [a, b, c] = pattern;

        if (boardState[a] !== "" &&
            boardState[a] === boardState[b] &&
            boardState[b] === boardState[c]) {

            winningLines.push(pattern);
        }
    }

    if (winningLines.length > 0) {
        return winningLines;
    }
    return null;
}

function checkDraw() {
    return boardState.every(cell => cell !== "");
}

function highlightWinningLine(winningIndices) {
    winningIndices.forEach(index => {
        const button = buttons[index];
        if (button) {
            button.classList.add('winner');
        }
    });
}

</script>
    </body>
</html>
